const nav=document.getElementById("nav");
const secs=document.getElementById("secs");
DATA.forEach((s,i)=>{
  const b=document.createElement("button");
  b.className="nb"+(i===0?" on":"");
  b.textContent=s.tag;
  b.onclick=()=>{
    document.querySelectorAll(".nb").forEach(x=>x.classList.remove("on"));
    document.querySelectorAll(".sec").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    document.getElementById("sec-"+s.id).classList.add("on");
  };
  nav.appendChild(b);
  const d=document.createElement("div");
  d.className="sec"+(i===0?" on":"");
  d.id="sec-"+s.id;
  d.innerHTML=`<div class="sh"><span class="stag">${s.tag}</span><span class="sti">${s.title}</span></div>${s.body}`;
  secs.appendChild(d);
});

function cp(btn,id){
  const t=document.getElementById("sec-"+id).innerText.replace(/Copy .*/g,"").trim();
  navigator.clipboard.writeText(t).then(()=>{
    btn.innerHTML='<i class="ti ti-check" aria-hidden="true"></i> Copied!';
    setTimeout(()=>{btn.innerHTML='<i class="ti ti-copy" aria-hidden="true"></i> Copy'},2000);
  });
}
</script>
